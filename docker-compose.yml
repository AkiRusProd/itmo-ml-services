services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: apartment-price-api
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      APP_NAME: ${APP_NAME:-Apartment Price Service}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      MODEL_PATH: ${MODEL_PATH:-artifacts/apartment_price_model.joblib}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://app_user:app_password@db:5432/apartment_service}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-false}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-for-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: apartment-price-worker
    command: >
      celery -A app.celery.celery_app worker --loglevel=info
    environment:
      APP_NAME: ${APP_NAME:-Apartment Price Service}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      MODEL_PATH: ${MODEL_PATH:-artifacts/apartment_price_model.joblib}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://app_user:app_password@db:5432/apartment_service}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-false}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-for-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: apartment-price-db
    environment:
      POSTGRES_DB: apartment_service
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d apartment_service"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: apartment-price-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
